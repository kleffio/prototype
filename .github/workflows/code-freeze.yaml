name: "Code Freeze Check"

on:
  pull_request:
    branches:
      - main

jobs:
  check-freeze:
    runs-on: ubuntu-latest
    steps:
      - name: Check Deadline
        shell: bash
        run: |
          # End of Saturday, Jan 31 in EST (UTC-5) is Sunday, Feb 2 at 10:00:00 UTC
          DEADLINE=$(date -d "2026-02-01 10:00:00" +%s)
          CURRENT=$(date +%s)

          if [ $CURRENT -gt $DEADLINE ]; then
            echo "❌ CODE FREEZE IN EFFECT."
            echo "The deadline (Midnight, Jan 31st) has passed."
            echo "Merges are restricted to focus on documentation and presentations."
            exit 1
          else
            echo "✅ Under deadline. Merges allowed."
            # Optional: Print how much time is left
            LEFT=$(( ($DEADLINE - $CURRENT) / 3600 ))
            echo "Approximately $LEFT hours remaining until code freeze."
          fi
