---
name: "Code Freeze Check"

on:
  pull_request:
    branches:
      - main

jobs:
  check-freeze:
    runs-on: ubuntu-latest
    steps:
      - name: Check Deadline
        shell: bash
        run: |
          # The deadline is the end of Friday, Feb 13th (Midnight).
          # In EST (UTC-5), Midnight entering Saturday, Feb 14 is 05:00:00 UTC.

          # Target: Feb 24, 2026 at 05:00:00 UTC
          DEADLINE=$(date -d "2026-03-20 05:00:00 UTC" +%s)
          CURRENT=$(date +%s)

          if [ $CURRENT -gt $DEADLINE ]; then
            echo "❌ CODE FREEZE IN EFFECT."
            echo "The deadline (Friday the 13th at Midnight EST) has passed."
            echo "It is now Saturday (or later). Merges are restricted."
            exit 1
          else
            echo "✅ Under deadline. Merges allowed."

            # Optional: Print how much time is left in hours
            LEFT=$(( ($DEADLINE - $CURRENT) / 3600 ))
            echo "Approximately $LEFT hours remaining until code freeze."
          fi
