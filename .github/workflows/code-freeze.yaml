name: "Code Freeze Check"

on:
  pull_request:
    branches:
      - main

jobs:
  check-freeze:
    runs-on: ubuntu-latest
    steps:
      - name: Check Deadline
        shell: bash
        run: |
          # Midnight (00:00:00) EST on Sat, Feb 14 is 05:00:00 UTC
          DEADLINE=$(date -d "2026-02-14 05:00:00" +%s)
          CURRENT=$(date +%s)

          if [ $CURRENT -gt $DEADLINE ]; then
            echo "❌ CODE FREEZE IN EFFECT."
            echo "The deadline (Midnight, Feb 14th EST) has passed."
            echo "Merges are restricted to focus on documentation and presentations."
            exit 1
          else
            echo "✅ Under deadline. Merges allowed."
            # Calculate remaining time
            DIFF=$(( $DEADLINE - $CURRENT ))
            HOURS=$(( $DIFF / 3600 ))
            MINUTES=$(( ($DIFF % 3600) / 60 ))
            echo "Time remaining: $HOURS hours and $MINUTES minutes until code freeze."
          fi
