---
services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_AUTH_CLIENT_ID: ${VITE_AUTH_CLIENT_ID}
        VITE_BACKEND_URL: ${VITE_BACKEND_URL}
    container_name: frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_AUTH_CLIENT_ID=8qNA2sSV88fusOocZcMj6GirTLWYygdAXnmtLUfe
      - VITE_BACKEND_URL=http://localhost:8080

  project-management-service:
    build:
      context: ./project-management-service
      dockerfile: Dockerfile
    container_name: project-management-service
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://project-management-db:5432/mydb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      project-management-db:
        condition: service_healthy

  project-management-db:
    image: postgres:16
    container_name: project-management-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mydb
    ports:
      - "5433:5432"
    volumes:
      - project_management_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mydb"]
      interval: 10s
      timeout: 5s
      retries: 5

  billing-service:
    build:
      context: ./billing-service
      dockerfile: Dockerfile
    container_name: billing-service
    ports:
      - "8085:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://billing-db:5432/mydb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      STRIPE_API_KEY: ${STRIPE_API_KEY}
      FRONTEND_URL: ${FRONTEND_URL}
      VITE_BACKEND_URL: http://project-management-service:8080
    depends_on:
      billing-db:
        condition: service_healthy
      project-management-service:
        condition: service_started

  billing-db:
    image: postgres:16
    container_name: billing-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mydb
    ports:
      - "5436:5432"
    volumes:
      - billing_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mydb"]
      interval: 10s
      timeout: 5s
      retries: 5


  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "8082:8080"
    environment:
      - HTTP_ADDR=:8080
      - AUTHENTIK_BASE_URL=${AUTHENTIK_BASE_URL:-http://authentik:9000}
      - AUTHENTIK_API_TOKEN=${AUTHENTIK_API_TOKEN}
      - POSTGRES_USER_DSN=postgres://user:pass@user-service-postgres:5432/userservice?sslmode=disable
      - POSTGRES_AUDIT_DSN=postgres://user:pass@user-service-postgres:5432/userservice?sslmode=disable
      - DEFAULT_ADMIN_EMAIL=${DEFAULT_ADMIN_EMAIL}
    depends_on:
      user-service-postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8080/healthz",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  user-service-postgres:
    image: postgres:16
    container_name: user-service-postgres
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=userservice
    volumes:
      - user_service_postgres_data:/var/lib/postgresql/data
      - ./user-service/internal/bootstrap/migrations:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d userservice"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  chat-support-service:
    build:
      context: ./chat-support-service
      dockerfile: Dockerfile
    container_name: chat-support-service

    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_INDEX_NAME=${PINECONE_INDEX_NAME:-kleff-docs}
      - PINECONE_ENVIRONMENT=${PINECONE_ENVIRONMENT}
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX_REQUESTS=100
    restart: unless-stopped


  deployment-service:
    build:
      context: ./deployment-service
      dockerfile: Dockerfile
    container_name: deployment-service
    ports:
      - "8084:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://deployment-db:5432/deployment_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      deployment-db:
        condition: service_healthy

  deployment-db:
    image: postgres:16
    container_name: deployment-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: deployment_db
    ports:
      - "5435:5432"
    volumes:
      - deployment_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d deployment_db"]
      interval: 10s
      timeout: 5s
      retries: 5
  observability-service:
    build:
      context: ./observability-service
      dockerfile: Dockerfile
    container_name: observability-service
    ports:
      - "8083:8080"
    environment:
      - SERVER_PORT=8080
      - PROMETHEUS_URL=http://host.docker.internal:9090
      - LOKI_URL=${LOKI_URL}
      - USER_SERVICE_URL=http://user-service:8080
      - ENVIRONMENT=development
    extra_hosts:
      - "host.docker.internal:host-gateway"

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - project-management-service
      - user-service
      - deployment-service
      - observability-service

volumes:
  project_management_data:
  deployment_data:
  user_service_postgres_data:
  billing_data:
